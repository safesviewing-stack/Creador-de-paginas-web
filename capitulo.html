<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuerdo - El Viaje</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <!-- EXIGIMOS QUE BAJE LOS ESTILOS BLINDADOS Y LIMPIOS (v=10) -->
    <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
    <div class="capitulo-vista" id="contenido-visor">
        <h1 id="titulo-cap">Cargando recuerdo...</h1>
        
        <div id="texto-cap"></div>
        
        <div id="caja-regalo" style="display:none; margin-top: 50px;">
            <a href="javascript:void(0);" class="capitulo-final activo" style="padding: 15px 40px; display:inline-block; text-decoration: none;">DESCARGAR REGALO FINAL</a>
        </div>

        <!-- SOLUCIÓN SUPREMA: Lo hemos transformado en una simple frase clicable (<span>). 
             Visualmente es idéntico al botón porque tiene el "class='btn-volver'".
             Mecánicamente, es sordo y no sabe dar latigazos en pantalla. Magia. -->
        <span onclick="volverForzandoRefresco()" class="btn-volver">← Volver al mapa general</span>
    </div>

    <script src="app.js?v=999"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const idCapitulo = params.get('id');

        let guardadoLocal = localStorage.getItem('el_viaje_progreso');
        let progresosApp = guardadoLocal ? JSON.parse(guardadoLocal) : [1];
        
        const visorCaja = document.getElementById('contenido-visor');

        if (!progresosApp.includes(parseInt(idCapitulo))) {
            visorCaja.innerHTML = `<h1>Recuerdo sin descubrir</h1><p style="margin-bottom: 50px">Todavía no has alcanzado esta parte de la historia. ¡Debes ir escaneando cada pequeño tesoro en su momento exacto!</p><span onclick="volverForzandoRefresco()" class="btn-volver">← Volver al mapa general</span>`;
        } else {
            if (capitulosData[idCapitulo]) {
                document.getElementById('titulo-cap').innerText = capitulosData[idCapitulo].titulo;
                document.getElementById('texto-cap').innerHTML = `<p>${capitulosData[idCapitulo].contenido}</p>`;

                if (idCapitulo === "10") {
                    document.getElementById('caja-regalo').style.display = 'block';
                    document.body.style.backgroundColor = '#2A2726'; 
                    document.body.style.color = '#BBA577';
                    document.getElementById('titulo-cap').style.color = '#BBA577';
                    document.getElementById('texto-cap').style.color = '#FAF9F6';
                    // Evitamos bugs visuales re-escribiendo colores
                }
            }
        }

        function volverForzandoRefresco() {
            // El salto seco por defecto ha sido abolido al usar una redirección pura js 
            window.location.href = "index.html?refresco=" + Date.now();
        }
    </script>
</body>
</html>
