<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbloqueando...</title>

    <!-- OBLIGAR AL MÓVIL A NO GUARDAR CACHÉ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
    <style>
        body { background: #2A2726; color: #BBA577; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; text-align: center; }
        .fade { animation: aparecer 3.2s ease-in-out; font-size: 2.5rem; letter-spacing: 3px;}
        @keyframes aparecer { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <h1 class="fade" id="texto-carga"></h1>

    <script src="app.js?v=999"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const capitulo = urlParams.get('cap');
        const esCreador = urlParams.get('creador') === '1';

        const textoVisor = document.getElementById('texto-carga');
        
        if (capitulo === '1') {
            textoVisor.innerText = "Iniciando el viaje...";
        } else if (capitulo) {
            textoVisor.innerText = "Abriendo nuevo recuerdo...";
        }

        if (capitulo) {
            let pasoAprobado = intentarDesbloquear(capitulo, esCreador);
            let idNum = parseInt(capitulo);
            let horaExacta = Date.now(); // Número aleatorio del milisegundo exacto

            if (pasoAprobado) {
                setTimeout(() => {
                    if (idNum === 1) {
                        // Lo enviamos sumándole basura de milisegundos para matar el caché SIEMPRE
                        window.location.href = "index.html?rf=" + horaExacta; 
                    } else {
                        window.location.href = "capitulo.html?id=" + idNum + "&rf=" + horaExacta; 
                    }
                }, 2800);
            } else {
                setTimeout(() => {
                    window.location.href = "index.html?rf=" + horaExacta;
                }, 100);
            }
        } else {
            window.location.href = "index.html?rf=" + Date.now();
        }
    </script>
</body>
</html>
