<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbloqueando...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
    <style>
        body { background: #2A2726; color: #BBA577; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; text-align: center; }
        .fade { animation: aparecer 3s ease-in-out; }
        @keyframes aparecer { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <h1 class="fade">Abriendo nuevo recuerdo...</h1>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const capitulo = urlParams.get('cap');
        
        // AQUÍ ESTÁ EL TRUCO PARA TI: detecta si pones en el link "&creador=1"
        const esCreador = urlParams.get('creador') === '1';

        if (capitulo) {
            let pasoAprobado = intentarDesbloquear(capitulo, esCreador);
            
            if (pasoAprobado) {
                // Va todo bien: a los 2.5 seg se mete a la carta de amor
                setTimeout(() => {
                    window.location.href = "capitulo.html?id=" + capitulo; 
                }, 2500);
            } else {
                // Si hizo trampas saltándose el orden: la expulsamos al mapa al instante tras salirle el aviso romántico
                window.location.href = "index.html";
            }
        } else {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
